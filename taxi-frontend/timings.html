<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cab Schedules - Shree Ram Taxi</title>
  <link rel="icon" href="assets/icons/shree-ram-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tailwind.css">
  <style>
    .timings-hero {
      background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#0f172a 100%);
      padding:2rem 0 1.5rem;color:#fff;
    }
    .filter-bar {
      background:#fff;border-bottom:1px solid #f1f5f9;padding:.75rem 0;
      position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06);
    }
    .filter-bar-inner { display:flex;align-items:center;gap:.75rem;flex-wrap:wrap; }
    .filter-chip {
      padding:.35rem 1rem;border-radius:999px;border:1px solid #e2e8f0;
      background:#f8fafc;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;
    }
    .filter-chip:hover,.filter-chip.active { background:#f59e0b;color:#fff;border-color:#f59e0b; }
    .sort-select {
      padding:.35rem .75rem;border-radius:8px;border:1px solid #e2e8f0;
      font-size:.82rem;background:#fff;color:#334155;cursor:pointer;outline:none;margin-left:auto;
    }
    .sort-select:focus { border-color:#f59e0b; }
    .loading-container { display:grid;gap:1.5rem; }
    .skeleton { background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px; }
    @keyframes shimmer { 0%{background-position:200% 0;}100%{background-position:-200% 0;} }
    .skeleton-text { height:16px;margin-bottom:10px; }
    .skeleton-text.short { width:50%; }
    .skeleton-button { height:40px;border-radius:8px;margin-top:12px; }
    .schedule-card {
      display:grid;grid-template-columns:1fr auto;gap:1.5rem;
      background:#fff;border-radius:1rem;padding:1.5rem;
      box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid #f1f5f9;
      border-left:4px solid #f59e0b;transition:box-shadow .2s,transform .2s;
      position:relative;overflow:hidden;
    }
    .schedule-card:hover { box-shadow:0 8px 30px rgba(0,0,0,.12);transform:translateY(-2px); }
    .schedule-cta {
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.75rem;min-width:140px;border-left:1px solid #f1f5f9;padding-left:1.5rem;
    }
    @media(max-width:600px){
      .schedule-card{grid-template-columns:1fr;}
      .schedule-cta{border-left:none;border-top:1px solid #f1f5f9;padding-left:0;padding-top:1rem;flex-direction:row;justify-content:space-between;flex-wrap:wrap;}
    }
    .navbar { background:rgba(15,23,42,.97);padding:.75rem 0;border-bottom:1px solid rgba(245,158,11,.2); }
    .nav-content { display:flex;align-items:center;justify-content:space-between; }
    .nav-brand { display:flex;align-items:center;gap:.75rem;text-decoration:none;color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem; }
    .nav-link { color:rgba(255,255,255,.75);text-decoration:none;font-size:.875rem;font-weight:500;transition:color .2s; }
    .nav-link:hover,.nav-link.active { color:#f59e0b; }
    .container { max-width:1100px;margin:0 auto;padding:0 1rem; }
    .nav-links { display:flex;gap:1.5rem;list-style:none;margin:0;padding:0; }
  </style>
</head>
<body style="background:#f8fafc;">

  <nav class="navbar">
    <div class="container">
      <div class="nav-content">
        <a href="index.html" class="nav-brand">
          <img src="assets/icons/shree-ram-logo.png" alt="Shree Ram Taxi" style="height:42px;">
          🚖 Shree Ram Taxi
        </a>
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="timings.html" class="nav-link active">Cab Schedules</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="timings-hero">
    <div class="container">
      <div id="filter-info"></div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="container">
      <div class="filter-bar-inner">
        <span style="font-size:.8rem;font-weight:600;color:#94a3b8;">Filter:</span>
        <button class="filter-chip active" onclick="filterByCabType('all')">All Cabs</button>
        <button class="filter-chip" onclick="filterByCabType('Sedan')">🚗 Sedan (4+1)</button>
        <button class="filter-chip" onclick="filterByCabType('SUV')">🚙 SUV (6+1)</button>
        <select id="sort-select" class="sort-select">
          <option value="">Sort by…</option>
          <option value="departure">Departure Time</option>
          <option value="price-low">Price: Low → High</option>
          <option value="price-high">Price: High → Low</option>
          <option value="seats">Available Seats</option>
        </select>
      </div>
    </div>
  </div>

  <div style="min-height:60vh;padding:2rem 0;">
    <div class="container">
      <div style="margin-bottom:1.5rem;display:flex;gap:.75rem;">
        <button onclick="history.back()" style="padding:.5rem 1rem;border:1px solid #e2e8f0;border-radius:.5rem;background:#fff;cursor:pointer;font-size:.875rem;color:#475569;">← Back</button>
        <button onclick="clearFilters()" style="padding:.5rem 1rem;border:1px solid #e2e8f0;border-radius:.5rem;background:#fff;cursor:pointer;font-size:.875rem;color:#475569;">Clear Filters</button>
      </div>
      <div id="schedules-list"></div>
    </div>
  </div>

  <footer style="background:#0f172a;color:#94a3b8;padding:2rem 0;text-align:center;margin-top:2rem;">
    <p style="font-size:.875rem;margin:0;">© 2025 Shree Ram Taxi. All rights reserved.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/timings.js"></script>
  <script>
    document.querySelectorAll('.filter-chip').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.filter-chip').forEach(function(b){ b.classList.remove('active'); });
        this.classList.add('active');
      });
    });
    function filterByCabType(type) {
      if (type === 'all') { displaySchedules(allSchedules); return; }
      var filtered = allSchedules.filter(function(s){ return s.type && s.type.includes(type); });
      displaySchedules(filtered);
    }
  </script>
</body>
</html>
