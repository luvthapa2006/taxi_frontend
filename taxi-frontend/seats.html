<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seat - Shree Ram Taxi</title>
  <link rel="icon" href="assets/icons/shree-ram-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tailwind.css">
  <style>
    body { background:#f8fafc; }
    .navbar { background:rgba(15,23,42,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(245,158,11,.2);padding:.75rem 0; }
    .nav-content { display:flex;align-items:center;justify-content:space-between; }
    .nav-brand { display:flex;align-items:center;gap:.75rem;text-decoration:none;color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem; }
    .container { max-width:1100px;margin:0 auto;padding:0 1rem; }
    .page-grid { display:grid;grid-template-columns:1fr;gap:1.5rem;padding:2rem 0; }
    @media(min-width:768px){ .page-grid{grid-template-columns:1fr 340px;} }
    .panel { background:#fff;border-radius:1rem;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid #e2e8f0;padding:1.5rem; }
    .summary-panel { background:#fff;border-radius:1rem;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid #e2e8f0;padding:1.5rem;position:sticky;top:80px;height:fit-content; }
    .back-btn { display:inline-flex;align-items:center;gap:.4rem;color:#64748b;font-size:.875rem;font-weight:500;cursor:pointer;background:none;border:none;padding:.4rem 0;margin-bottom:1rem;text-decoration:none;transition:color .2s; }
    .back-btn:hover { color:#f59e0b; }
    @media(max-width:768px){ .page-grid{padding:1rem 0;} .panel,.summary-panel{padding:1rem;} }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-content">
        <a href="index.html" class="nav-brand">
          <img src="assets/icons/shree-ram-logo.png" alt="Shree Ram Taxi" style="height:40px;">
          🚖 Shree Ram Taxi
        </a>
        <a href="timings.html" style="color:rgba(255,255,255,.7);text-decoration:none;font-size:.875rem;">← Cab Schedules</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-grid">
      <!-- Seat Selection -->
      <div class="panel">
        <a class="back-btn" onclick="goBack()">← Back to Schedules</a>
        <div id="schedule-info" style="margin-bottom:1.5rem;"></div>
        <!-- Deck placeholders (hidden, replaced by JS) -->
        <div id="upper-deck"></div>
        <div id="lower-deck"></div>
      </div>

      <!-- Summary sidebar -->
      <div class="summary-panel">
        <div id="journey-details" style="margin-bottom:1.25rem;"></div>
        <div style="border-top:1px solid #e2e8f0;margin-bottom:1.25rem;"></div>
        <div id="booking-summary"></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/seats.js"></script>
</body>
</html>
